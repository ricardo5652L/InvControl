<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-labelledby="title desc">
  <title id="title">InvControl</title>
  <desc id="desc">Logo de InvControl con caja de inventario y marca de control.</desc>
  <defs>
    <linearGradient id="chrome-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020817"/>
      <stop offset="0.4" stop-color="#071c3f"/>
      <stop offset="0.72" stop-color="#0a2f5f"/>
      <stop offset="1" stop-color="#02111f"/>
    </linearGradient>
